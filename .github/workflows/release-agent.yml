name: Release Agent

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/agent/**"

permissions:
  contents: write

concurrency:
  group: "agent-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t agent-builder ./src/agent

      - name: Run build inside container
        run: |
          docker run --name agent-container agent-builder sh -c "./build.sh"

      - name: Extract binary
        run: |
          docker cp agent-container:/app/build/main.bin ./main.bin

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f agent-container || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary
          path: main.bin

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: agent-binary

      - name: Checkout repo (for tagging)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create and push version tag
        run: |
          TAG="v$(date +'%Y.%m.%d.%H%M%S')"
          echo "TAG=$TAG" >> $GITHUB_ENV

          git tag $TAG
          git push origin $TAG

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: main.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}