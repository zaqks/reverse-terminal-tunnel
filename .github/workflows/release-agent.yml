name: Release Agent

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/agent/**"

permissions:
  contents: write

concurrency:
  group: "agent-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t agent-builder ./src/agent

      - name: Run build inside container
        run: |
          docker run --name agent-container -w /src/agent agent-builder ./build.sh

      - name: Extract binary
        run: |
          docker cp agent-container:/src/agent/build/main.bin ./main.bin

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f agent-container || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary
          path: main.bin


  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: agent-binary

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: main.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}