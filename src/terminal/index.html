<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
  <style>
    /* Ensure the terminal container fills the entire screen without scrollbars */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      background: black; 
      overflow: hidden; 
    }
    #terminal { 
      height: 100vh; 
      width: 100vw; 
    }
  </style>
</head>
<body>
<div id="terminal"></div>

<script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>

<script>
  // 1. Initialize Terminal
  const term = new Terminal({
    cursorBlink: true,
    fontFamily: 'Courier New, monospace',
    fontSize: 14,
    theme: { background: '#000000' }
  });
  
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  
  // 2. Open Terminal and fit to window
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  // 3. Establish WebSocket connection
  const ws = new WebSocket(`ws://${window.location.host}/term`);

  ws.onopen = () => {
    // Synchronize the backend terminal size with the frontend dimensions
    ws.send(JSON.stringify(['set_size', term.rows, term.cols]));
    console.log("Connected to backend shell");
  };

  // 4. Handle incoming data (STDOUT)
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data[0] === 'stdout') {
      term.write(data[1]);
    }
  };

  // 5. Send keystrokes (STDIN)
  // Terminado expects a JSON list format: ["stdin", "character_data"]
  term.onData(data => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(['stdin', data]));
    }
  });

  // 6. Handle Terminal Exit / Disconnect
  ws.onclose = () => {
    term.write('\r\n\n\x1b[31m[Process Completed - Session Closed]\x1b[0m\r\n');
    term.write('Refresh the page (F5) to start a new bash session.\r\n');
  };

  // 7. Handle browser window resizing
  window.addEventListener('resize', () => {
    fitAddon.fit();
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(['set_size', term.rows, term.cols]));
    }
  });
</script>
</body>
</html>
